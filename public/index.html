<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#081713">
  <title>Proxy Manager Deck</title>
  <link rel="stylesheet" href="/demo2.css?v=20260723-1">
  <link rel="stylesheet" href="/real-ui.css?v=20260723-4">
</head>
<body>
  <div class="shell" id="appShell">
    <aside class="sidebar" id="sidebar">
      <button class="brand" data-page="dashboard">
        <span class="brand-mark" id="brandMark">PM</span>
        <img class="brand-image" id="brandImage" alt="Logo" hidden>
        <span><strong>Proxy Manager Deck</strong><small>CONTROL PLANE</small></span>
      </button>
      <nav id="nav">
        <section><small>START</small><button class="active" data-page="dashboard"><i>⌂</i><span>Übersicht</span></button></section>
        <section><small>ROUTING</small><button data-page="proxies"><i>⇄</i><span>Proxy Hosts</span><b id="hostBadge">0</b></button><button data-page="redirects"><i>↗</i><span>Weiterleitungen</span></button><button data-page="streams"><i>≋</i><span>Streams</span></button></section>
        <section><small>SICHERHEIT</small><button data-page="certificates"><i>◇</i><span>Zertifikate</span><b class="warning" id="certBadge">0</b></button><button data-page="dns"><i>⌘</i><span>DNS-Anbieter</span></button><button data-page="users"><i>♙</i><span>Benutzer</span></button></section>
        <section><small>ÜBERWACHUNG</small><button data-page="health"><i>◉</i><span>Healthchecks</span></button><button data-page="traffic"><i>⌁</i><span>Traffic &amp; Hits</span></button><button data-page="notifications"><i>♢</i><span>Benachrichtigungen</span></button><button data-page="logs"><i>≡</i><span>Protokolle</span></button></section>
        <section><small>SYSTEM</small><button data-page="design"><i>⚙</i><span>Design</span></button><button data-page="update"><i>↻</i><span>Update</span></button></section>
      </nav>
      <div class="side-bottom">
        <div class="gateway"><i></i><span><strong id="gatewayTitle">Gateway online</strong><small id="gatewayDetail">Status wird geladen</small></span></div>
        <button class="profile" data-page="users"><span id="avatar">AD</span><span><strong id="accountName">admin</strong><small id="accountRole">Administrator</small></span><i>›</i></button>
        <button class="logout" id="logoutButton">Logout</button>
      </div>
    </aside>
    <main>
      <header>
        <button class="mobile-menu" id="mobileMenu">☰</button>
        <div class="breadcrumb"><span>Proxy Manager Deck</span><i>/</i><strong id="crumb">Übersicht</strong></div>
        <div class="header-actions"><button id="languageButton" title="Sprache">DE</button><button id="updateButton" class="update">Aktuell</button><button id="themeButton" title="Darstellung">☾</button></div>
      </header>
      <div class="page" id="page"></div>
    </main>
  </div>
  <div class="mobile-actions"><button data-page="dashboard">⌂<span>Übersicht</span></button><button data-page="proxies">⇄<span>Hosts</span></button><button data-page="proxy-new">＋<span>Neu</span></button><button data-page="certificates">◇<span>SSL</span></button><button id="mobileMore">☰<span>Menü</span></button></div>
  <div class="login-screen" id="loginScreen">
    <form class="login-panel" id="loginForm">
      <div class="login-brand"><span class="brand-mark">PM</span><strong>Proxy Manager Deck</strong></div>
      <h1>Willkommen zurück</h1><p>Melde dich an, um dein Gateway zu verwalten.</p>
      <label>Benutzername<input id="loginUser" autocomplete="username" value="admin" required></label>
      <label>Passwort<input id="loginPassword" type="password" autocomplete="current-password" required></label>
      <div class="form-error" id="loginError"></div>
      <button class="button primary">Sicher anmelden</button>
    </form>
  </div>
  <div class="toast" id="toast"><i>✓</i><span><strong></strong><small></small></span></div>
  <script src="/real-ui.js?v=20260723-6"></script>
</body>
</html>
