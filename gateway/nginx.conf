user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;
events { worker_connections 2048; }
stream { include /etc/nginx/proxydeck/proxydeck-stream.conf; }
http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  log_format proxydeck escape=json '{"ts":$msec,"host":"$host","status":$status,"bytes":$body_bytes_sent,"time":$request_time}';
  access_log /logs/access.log proxydeck;
  sendfile on;
  keepalive_timeout 65;
  map $http_upgrade $connection_upgrade { default upgrade; '' close; }
  include /etc/nginx/proxydeck/proxydeck-http.conf;
}
